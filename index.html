<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kuripedu · Collaborative Notepad</title>
    <!-- Quill rich text editor -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <!-- Yjs ecosystem for collaboration -->
    <script src="https://cdn.jsdelivr.net/npm/yjs@13.6.15/dist/y.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/y-webrtc@10.2.5/dist/y-webrtc.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/y-quill@0.2.0/dist/y-quill.min.js"></script>
    <!-- QR Code generation -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-body: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --toolbar-bg: #ffffffcc;
        }
        body.dark {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --toolbar-bg: #1e293bcc;
        }
        body.sepia {
            --bg-body: #fbf7e9;
            --bg-panel: #fef9e6;
            --text-main: #4a3b2c;
            --text-muted: #6b5a48;
            --border: #e2d5b6;
            --toolbar-bg: #fef9e6cc;
        }
        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.2s, color 0.2s;
            padding: 1rem;
        }
        /* Deep Work Mode: hide UI except editor */
        body.deep-work .notepad-header,
        body.deep-work .sync-panel,
        body.deep-work .status-bar,
        body.deep-work .ql-toolbar {
            display: none !important;
        }
        body.deep-work .editor-wrapper {
            padding: 0 !important;
        }
        body.deep-work #quillEditor {
            min-height: 100vh !important;
        }
        body.deep-work .ql-container {
            border: none !important;
            font-size: 1.2rem;
        }
        body.deep-work .app-container {
            max-width: 100% !important;
            margin: 0 !important;
        }
        body.deep-work .notepad-card {
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .notepad-card {
            background: var(--bg-panel);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .notepad-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        button, select {
            background: var(--toolbar-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            transition: 0.1s;
            display: inline-flex;
            gap: 0.4rem;
            align-items: center;
            font-family: inherit;
        }
        button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .editor-wrapper {
            padding: 1rem 1.5rem 1.5rem;
        }
        #quillEditor {
            min-height: 400px;
        }
        .ql-container {
            font-size: 0.95rem;
        }
        .sync-panel {
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 1.5rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 0.8rem;
            font-size: 0.8rem;
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .badge {
            background: var(--accent);
            color: white;
            border-radius: 1rem;
            padding: 0.2rem 0.7rem;
            font-size: 0.7rem;
        }
        .qr-area {
            display: none;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: var(--bg-panel);
            border-radius: 0.8rem;
            border: 1px solid var(--border);
            width: fit-content;
        }
        .status-bar {
            padding: 0.6rem 1.5rem;
            font-size: 0.75rem;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        @media (max-width: 700px) {
            .notepad-header { flex-direction: column; align-items: stretch; }
            body { padding: 0.5rem; }
            .sync-panel { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="notepad-card">
        <div class="notepad-header">
            <h1><i class="fas fa-users"></i> Kuripedu · Collaborative</h1>
            <div class="toolbar-group">
                <button id="deepWorkBtn"><i class="fas fa-brain"></i> Deep Work</button>
                <button id="themeToggleBtn"><i class="fas fa-palette"></i> Theme</button>
                <select id="fontSelect">
                    <option value="0.9rem">Font: Small</option>
                    <option value="1rem" selected>Font: Normal</option>
                    <option value="1.2rem">Font: Large</option>
                    <option value="1.4rem">Font: X-Large</option>
                </select>
                <select id="lineHeightSelect">
                    <option value="1.4">Line H: 1.4</option>
                    <option value="1.6" selected>Line H: 1.6</option>
                    <option value="1.8">Line H: 1.8</option>
                    <option value="2.0">Line H: 2.0</option>
                </select>
                <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>
        <div class="editor-wrapper">
            <div id="quillEditor"></div>
        </div>
        <div class="sync-panel">
            <div class="sync-status">
                <span><i class="fas fa-globe"></i> Real-time collab</span>
                <span id="roomStatus" class="badge">🟢 Connecting...</span>
                <span><i class="fas fa-user-friends"></i> <span id="peerCount">0</span> online</span>
            </div>
            <div style="display: flex; gap: 0.5rem;">
                <button id="shareLinkBtn"><i class="fas fa-link"></i> Copy invite link</button>
                <button id="showQrBtn"><i class="fas fa-qrcode"></i> Show QR</button>
            </div>
            <div id="qrContainer" class="qr-area">
                <div id="qrcode"></div>
                <small style="margin-top: 0.3rem; display: block;">Scan to join this room</small>
            </div>
        </div>
        <div class="status-bar">
            <span><i class="fas fa-save"></i> Auto-saved</span>
            <span><i class="fas fa-chart-line"></i> Words: <span id="wordCount">0</span> | Characters: <span id="charCount">0</span></span>
        </div>
    </div>
</div>

<script>
    (function() {
        // No auto-reload loops. We'll just wait for libraries gracefully.
        let initialized = false;
        
        function initApp() {
            if (initialized) return;
            if (typeof Y === 'undefined' || typeof YWebRTC === 'undefined' || typeof QuillBinding === 'undefined') {
                console.warn("Waiting for collaboration libraries...");
                setTimeout(initApp, 200);
                return;
            }
            initialized = true;
            
            // ---------- 1. Initialize Quill ----------
            const quill = new Quill('#quillEditor', {
                theme: 'snow',
                placeholder: 'Write anything – your changes sync live with others.\nShare the link or QR code to collaborate.',
                modules: {
                    toolbar: [
                        [{ 'header': [1,2,3,false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'clean']
                    ]
                }
            });

            // ---------- 2. Setup Yjs & WebRTC collaboration ----------
            const ydoc = new Y.Doc();
            const binding = new QuillBinding(quill, ydoc.getText('quill'), null);
            
            // Generate a unique room name
            const urlParams = new URLSearchParams(window.location.search);
            let roomName = urlParams.get('room');
            if (!roomName) {
                roomName = 'kuripedu-' + Math.random().toString(36).substring(2, 10);
                const newUrl = new URL(window.location.href);
                newUrl.searchParams.set('room', roomName);
                window.history.replaceState({}, '', newUrl);
            }
            
            let provider = null;
            function initCollaboration() {
                provider = new YWebRTC(roomName, ydoc, { signaling: ['wss://signaling.yjs.dev'] });
                provider.on('peers', (peers) => {
                    const count = peers.size;
                    document.getElementById('peerCount').innerText = count;
                    const statusSpan = document.getElementById('roomStatus');
                    if (count > 0) statusSpan.innerHTML = `🟢 ${count} peer(s)`;
                    else statusSpan.innerHTML = '🟢 Alone (share to invite)';
                });
                provider.on('status', (status) => {
                    const statusSpan = document.getElementById('roomStatus');
                    if (status.connected) {
                        if (!statusSpan.innerHTML.startsWith('🟢')) statusSpan.innerHTML = '🟢 Connected';
                    } else {
                        statusSpan.innerHTML = '🔴 Offline (reconnecting...)';
                    }
                });
            }
            initCollaboration();

            // ---------- 3. Local backup & stats ----------
            const STORAGE_KEY = 'kuripedu_collab_backup';
            function saveBackup() {
                const content = quill.root.innerHTML;
                localStorage.setItem(STORAGE_KEY, content);
                updateStats();
                const statusSpan = document.querySelector('.status-bar span:first-child');
                if (statusSpan) {
                    const original = statusSpan.innerHTML;
                    statusSpan.innerHTML = '<i class="fas fa-check"></i> Saved';
                    setTimeout(() => { if(statusSpan) statusSpan.innerHTML = original; }, 1000);
                }
            }
            function loadBackup() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved && saved !== '<p><br></p>') {
                    quill.root.innerHTML = saved;
                } else {
                    quill.setText('✨ Collaborative Notepad ✨\n\n• Invite others using the link or QR code.\n• All changes appear in real time.\n• Click "Deep Work" for distraction-free fullscreen.\n• Export your note as HTML.\n\nHappy co-writing!');
                }
                updateStats();
            }
            function updateStats() {
                const text = quill.getText();
                const chars = text.length;
                const words = text.trim().split(/\s+/).filter(w => w.length).length;
                document.getElementById('wordCount').innerText = words;
                document.getElementById('charCount').innerText = chars;
            }
            quill.on('text-change', saveBackup);
            
            // ---------- 4. Theme ----------
            let themeIndex = 0;
            const themes = ['light', 'dark', 'sepia'];
            const savedTheme = localStorage.getItem('kuripedu_theme');
            if (savedTheme === 'dark') { document.body.classList.add('dark'); themeIndex = 1; }
            if (savedTheme === 'sepia') { document.body.classList.add('sepia'); themeIndex = 2; }
            document.getElementById('themeToggleBtn').addEventListener('click', () => {
                themeIndex = (themeIndex + 1) % 3;
                document.body.classList.remove('dark', 'sepia');
                if (themes[themeIndex] === 'dark') document.body.classList.add('dark');
                if (themes[themeIndex] === 'sepia') document.body.classList.add('sepia');
                localStorage.setItem('kuripedu_theme', themes[themeIndex]);
            });

            // ---------- 5. Font & line height ----------
            const fontSelect = document.getElementById('fontSelect');
            const lineSelect = document.getElementById('lineHeightSelect');
            function applyEditorStyle() {
                const editor = document.querySelector('.ql-editor');
                if (editor) {
                    editor.style.fontSize = fontSelect.value;
                    editor.style.lineHeight = lineSelect.value;
                }
            }
            fontSelect.addEventListener('change', applyEditorStyle);
            lineSelect.addEventListener('change', applyEditorStyle);
            setTimeout(applyEditorStyle, 100);

            // ---------- 6. Export ----------
            document.getElementById('exportBtn').addEventListener('click', () => {
                const content = quill.root.innerHTML;
                const fullHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kuripedu_Export</title>
    <style>
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 2rem; max-width: 900px; margin: 0 auto; line-height: 1.6; }
        h1 { color: #3b82f6; }
        .ql-editor { font-size: 1rem; }
    </style>
</head>
<body>
<h1>📝 Kuripedu Export</h1>
${content}
</body>
</html>`;
                const blob = new Blob([fullHtml], { type: 'text/html' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `kuripedu_${Date.now()}.html`;
                link.click();
                URL.revokeObjectURL(link.href);
            });

            // ---------- 7. Deep Work ----------
            const deepBtn = document.getElementById('deepWorkBtn');
            let isDeep = false;
            function toggleDeepWork() {
                if (!isDeep) {
                    document.body.classList.add('deep-work');
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) elem.requestFullscreen().catch(e => console.warn(e));
                    deepBtn.innerHTML = '<i class="fas fa-undo-alt"></i> Exit Deep Work';
                    isDeep = true;
                } else {
                    document.body.classList.remove('deep-work');
                    if (document.exitFullscreen) document.exitFullscreen().catch(e => console.warn(e));
                    deepBtn.innerHTML = '<i class="fas fa-brain"></i> Deep Work';
                    isDeep = false;
                }
            }
            deepBtn.addEventListener('click', toggleDeepWork);
            document.addEventListener('fullscreenchange', () => {
                if (!document.fullscreenElement && isDeep) {
                    document.body.classList.remove('deep-work');
                    deepBtn.innerHTML = '<i class="fas fa-brain"></i> Deep Work';
                    isDeep = false;
                }
            });

            // ---------- 8. Share Link & QR ----------
            const shareLinkBtn = document.getElementById('shareLinkBtn');
            const showQrBtn = document.getElementById('showQrBtn');
            const qrContainer = document.getElementById('qrContainer');
            const qrDiv = document.getElementById('qrcode');
            
            function getCurrentRoomUrl() {
                let url = new URL(window.location.href);
                url.searchParams.set('room', roomName);
                return url.toString();
            }
            
            shareLinkBtn.addEventListener('click', async () => {
                const url = getCurrentRoomUrl();
                try {
                    await navigator.clipboard.writeText(url);
                    alert('Invite link copied to clipboard!\nShare it with anyone to collaborate.');
                } catch (err) {
                    alert('Could not copy link. You can manually copy: ' + url);
                }
            });
            
            let qrGenerated = false;
            showQrBtn.addEventListener('click', () => {
                if (qrContainer.style.display === 'none' || qrContainer.style.display === '') {
                    qrContainer.style.display = 'block';
                    if (!qrGenerated) {
                        const url = getCurrentRoomUrl();
                        qrDiv.innerHTML = '';
                        new QRCode(qrDiv, {
                            text: url,
                            width: 120,
                            height: 120
                        });
                        qrGenerated = true;
                    }
                    showQrBtn.innerHTML = '<i class="fas fa-qrcode"></i> Hide QR';
                } else {
                    qrContainer.style.display = 'none';
                    showQrBtn.innerHTML = '<i class="fas fa-qrcode"></i> Show QR';
                }
            });
            qrContainer.style.display = 'none';
            
            // ---------- 9. Load backup ----------
            loadBackup();
            setInterval(saveBackup, 30000);
        }
        
        // Start the app after a short delay to let scripts load
        setTimeout(initApp, 100);
    })();
</script>
</body>
</html>
