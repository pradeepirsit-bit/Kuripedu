<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuripedu · Reliable Firestore Collab</title>
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg-body: #f8fafc; --bg-panel: #ffffff; --text-main: #0f172a; --border: #e2e8f0; --accent: #3b82f6; }
        body.dark { --bg-body: #0f172a; --bg-panel: #1e293b; --text-main: #f1f5f9; --border: #334155; }
        body.sepia { --bg-body: #fbf7e9; --bg-panel: #fef9e6; --text-main: #4a3b2c; --border: #e2d5b6; }
        body { background: var(--bg-body); color: var(--text-main); font-family: system-ui; padding: 1rem; transition: 0.2s; }
        .app-container { max-width: 1200px; margin: 0 auto; }
        .notepad-card { background: var(--bg-panel); border-radius: 1.5rem; border: 1px solid var(--border); overflow: hidden; }
        .notepad-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 1rem; }
        h1 { font-size: 1.5rem; background: linear-gradient(135deg, var(--accent), #8b5cf6); background-clip: text; -webkit-background-clip: text; color: transparent; }
        .toolbar-group { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
        button, select { background: var(--bg-panel); border: 1px solid var(--border); padding: 0.4rem 0.9rem; border-radius: 2rem; cursor: pointer; font-size: 0.85rem; display: inline-flex; gap: 0.4rem; align-items: center; font-family: inherit; color: var(--text-main); }
        button:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .ql-editor { min-height: 450px; }
        .sync-panel { background: var(--bg-panel); border-top: 1px solid var(--border); padding: 0.6rem 1.5rem; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 0.8rem; font-size: 0.8rem; }
        .status-badge { background: var(--accent); color: white; border-radius: 1rem; padding: 0.2rem 0.7rem; font-size: 0.7rem; }
        .status-bar { padding: 0.6rem 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; font-size: 0.75rem; }
        .syncing { animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        body.deep-work .notepad-header, body.deep-work .sync-panel, body.deep-work .status-bar, body.deep-work .ql-toolbar { display: none !important; }
        body.deep-work .ql-editor { min-height: 100vh !important; }
        body.deep-work .app-container, body.deep-work .notepad-card { max-width: 100% !important; margin: 0 !important; border-radius: 0 !important; border: none !important; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="notepad-card">
        <div class="notepad-header">
            <h1><i class="fas fa-fire"></i> Kuripedu · Reliable Sync</h1>
            <div class="toolbar-group">
                <button id="deepWorkBtn"><i class="fas fa-brain"></i> Deep Work</button>
                <button id="themeBtn"><i class="fas fa-palette"></i> Theme</button>
                <select id="fontSelect" name="fontSelect">
                    <option value="1rem">Normal</option>
                    <option value="1.2rem">Large</option>
                </select>
                <select id="lineHeightSelect" name="lineHeightSelect">
                    <option value="1.6">1.6</option>
                    <option value="1.8">1.8</option>
                </select>
                <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>
        <div id="editorContainer"></div>
        <div class="sync-panel">
            <div><span><i class="fas fa-globe"></i> Mode: </span><span id="modeStatus" class="status-badge">🟡 Connecting...</span></div>
            <div><button id="shareLinkBtn"><i class="fas fa-link"></i> Copy Room Link</button></div>
        </div>
        <div class="status-bar">
            <span><i class="fas fa-save"></i> <span id="saveStatus">Auto-saved</span></span>
            <span>Words: <span id="wordCount">0</span> | Chars: <span id="charCount">0</span></span>
        </div>
    </div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyBR_HZdIaIFWxCPR0gKwaAswsbKofPHzMQ",
        authDomain: "kuripedu-533ce.firebaseapp.com",
        projectId: "kuripedu-533ce",
        storageBucket: "kuripedu-533ce.firebasestorage.app",
        messagingSenderId: "758703500345",
        appId: "1:758703500345:web:4ed50a1f0c260efa4ab1e8"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Room ID
    const urlParams = new URLSearchParams(window.location.search);
    let roomName = urlParams.get('room');
    if (!roomName) {
        roomName = 'kuripedu-' + Math.random().toString(36).substring(2, 10);
        const newUrl = new URL(window.location.href);
        newUrl.searchParams.set('room', roomName);
        window.history.replaceState({}, '', newUrl);
    }

    // Quill editor
    const quill = new Quill('#editorContainer', {
        theme: 'snow',
        modules: {
            toolbar: [['bold', 'italic', 'underline'], [{ list: 'ordered' }, { list: 'bullet' }], ['link', 'clean']]
        }
    });

    // Firestore doc reference
    const docRef = db.collection('notes').doc(roomName);

    // Sync state
    let isRemoteUpdate = false;
    let lastSavedContent = '';
    let version = 0;
    let saveTimeout = null;
    let isSaving = false;

    // UI elements
    const modeStatus = document.getElementById('modeStatus');
    const saveStatusSpan = document.getElementById('saveStatus');

    function updateStats() {
        const text = quill.getText();
        const words = text.trim().split(/\s+/).filter(w => w.length).length;
        document.getElementById('wordCount').innerText = words;
        document.getElementById('charCount').innerText = text.length;
    }

    // Save to Firestore using transaction to avoid conflicts
    async function saveToFirestore(force = false) {
        if (isRemoteUpdate) return;
        const currentContent = quill.root.innerHTML;
        if (!force && currentContent === lastSavedContent) return;
        if (isSaving) return;

        isSaving = true;
        saveStatusSpan.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Syncing...';
        saveStatusSpan.classList.add('syncing');

        try {
            await db.runTransaction(async (transaction) => {
                const docSnapshot = await transaction.get(docRef);
                const currentVersion = docSnapshot.exists ? docSnapshot.data().version || 0 : 0;
                const newVersion = currentVersion + 1;
                transaction.set(docRef, {
                    content: currentContent,
                    version: newVersion,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });
                version = newVersion;
                lastSavedContent = currentContent;
            });
            saveStatusSpan.innerHTML = 'Synced';
            saveStatusSpan.classList.remove('syncing');
            setTimeout(() => {
                if (saveStatusSpan.innerHTML === 'Synced') saveStatusSpan.innerHTML = 'Auto-saved';
            }, 1500);
        } catch (error) {
            console.warn("Transaction failed, retrying...", error);
            saveStatusSpan.innerHTML = 'Retry...';
            setTimeout(() => saveToFirestore(true), 1000);
        } finally {
            isSaving = false;
        }
    }

    // Debounced save
    function scheduleSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            saveToFirestore();
        }, 800);
    }

    // Listen for remote changes
    docRef.onSnapshot((snapshot) => {
        if (!snapshot.exists) return;
        const remoteContent = snapshot.data().content;
        const remoteVersion = snapshot.data().version || 0;
        if (remoteVersion > version && remoteContent !== undefined) {
            // Remote update is newer
            isRemoteUpdate = true;
            const currentContent = quill.root.innerHTML;
            if (currentContent !== remoteContent) {
                quill.root.innerHTML = remoteContent;
                lastSavedContent = remoteContent;
                version = remoteVersion;
                updateStats();
                // Show remote update indicator briefly
                const modeHtml = modeStatus.innerHTML;
                modeStatus.innerHTML = '🟢 Updated from peer';
                setTimeout(() => { modeStatus.innerHTML = modeHtml; }, 1000);
            }
            isRemoteUpdate = false;
        } else if (remoteVersion < version) {
            // Local is newer, push it
            saveToFirestore(true);
        }
        modeStatus.innerHTML = '🟢 Live (Firestore)';
        modeStatus.style.background = '#10b981';
    }, (error) => {
        console.error("Snapshot error:", error);
        modeStatus.innerHTML = '🔴 Offline';
        modeStatus.style.background = '#ef4444';
    });

    // Local edits
    quill.on('text-change', () => {
        updateStats();
        scheduleSave();
        saveBackup();
    });

    // Local backup
    const BACKUP_KEY = 'kuripedu_backup';
    function saveBackup() {
        localStorage.setItem(BACKUP_KEY, quill.root.innerHTML);
    }
    function loadBackup() {
        const saved = localStorage.getItem(BACKUP_KEY);
        if (saved && saved !== '<p><br></p>') {
            quill.root.innerHTML = saved;
        } else {
            quill.setText('✨ Kuripedu with Reliable Sync ✨\n\n• Share this URL with a friend.\n• Changes save automatically and sync in real time.\n• Click "Deep Work" for fullscreen focus.\n\nHappy co-writing!');
        }
        updateStats();
        lastSavedContent = quill.root.innerHTML;
        // Try to push local content to Firestore
        setTimeout(() => saveToFirestore(true), 500);
    }
    loadBackup();

    // UI Controls (Theme, font, deep work, export, share)
    document.getElementById('themeBtn').addEventListener('click', () => {
        const themes = ['light', 'dark', 'sepia'];
        let idx = localStorage.getItem('themeIdx') ? parseInt(localStorage.getItem('themeIdx')) : 0;
        idx = (idx + 1) % 3;
        document.body.classList.remove('dark', 'sepia');
        if (themes[idx] === 'dark') document.body.classList.add('dark');
        if (themes[idx] === 'sepia') document.body.classList.add('sepia');
        localStorage.setItem('themeIdx', idx);
    });
    const savedIdx = localStorage.getItem('themeIdx');
    if (savedIdx === '1') document.body.classList.add('dark');
    if (savedIdx === '2') document.body.classList.add('sepia');

    const fontSelect = document.getElementById('fontSelect');
    const lineSelect = document.getElementById('lineHeightSelect');
    function applyStyle() {
        const editor = document.querySelector('.ql-editor');
        if (editor) {
            editor.style.fontSize = fontSelect.value;
            editor.style.lineHeight = lineSelect.value;
        }
    }
    fontSelect.addEventListener('change', applyStyle);
    lineSelect.addEventListener('change', applyStyle);
    setTimeout(applyStyle, 100);

    document.getElementById('exportBtn').addEventListener('click', () => {
        const content = quill.root.innerHTML;
        const blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Kuripedu Export</title></head><body>${content}</body></html>`], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `kuripedu_${Date.now()}.html`;
        a.click();
        URL.revokeObjectURL(a.href);
    });

    let isDeep = false;
    document.getElementById('deepWorkBtn').addEventListener('click', () => {
        if (!isDeep) {
            document.body.classList.add('deep-work');
            document.documentElement.requestFullscreen();
            isDeep = true;
        } else {
            document.body.classList.remove('deep-work');
            document.exitFullscreen();
            isDeep = false;
        }
    });
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement && isDeep) {
            document.body.classList.remove('deep-work');
            isDeep = false;
        }
    });

    document.getElementById('shareLinkBtn').addEventListener('click', () => {
        const url = new URL(window.location.href);
        url.searchParams.set('room', roomName);
        navigator.clipboard.writeText(url.toString()).then(() => alert('Room link copied!'));
    });

    // Periodic version check (every 5 seconds) to catch any missed updates
    setInterval(async () => {
        try {
            const doc = await docRef.get();
            if (doc.exists) {
                const remoteVersion = doc.data().version || 0;
                if (remoteVersion > version && !isRemoteUpdate) {
                    // Force refresh
                    isRemoteUpdate = true;
                    quill.root.innerHTML = doc.data().content;
                    version = remoteVersion;
                    lastSavedContent = doc.data().content;
                    updateStats();
                    isRemoteUpdate = false;
                }
            }
        } catch(e) {}
    }, 5000);
</script>
</body>
</html>
