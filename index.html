<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Kuripedu · Simple Notepad</title>
    <!-- Quill rich text editor (lightweight, reliable) -->
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-body: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --toolbar-bg: #ffffffcc;
        }
        body.dark {
            --bg-body: #0f172a;
            --bg-panel: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: #334155;
            --toolbar-bg: #1e293bcc;
        }
        body.sepia {
            --bg-body: #fbf7e9;
            --bg-panel: #fef9e6;
            --text-main: #4a3b2c;
            --text-muted: #6b5a48;
            --border: #e2d5b6;
            --toolbar-bg: #fef9e6cc;
        }
        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: background 0.2s, color 0.2s;
            padding: 1rem;
        }
        /* Deep Work Mode: hide everything except the editor */
        body.deep-work .notepad-header,
        body.deep-work .status-bar,
        body.deep-work .ql-toolbar {
            display: none !important;
        }
        body.deep-work .editor-wrapper {
            padding: 0 !important;
        }
        body.deep-work #quillEditor {
            min-height: 100vh !important;
        }
        body.deep-work .ql-container {
            border: none !important;
            font-size: 1.2rem;
        }
        body.deep-work .app-container {
            max-width: 100% !important;
            margin: 0 !important;
        }
        body.deep-work .notepad-card {
            border-radius: 0 !important;
            border: none !important;
            box-shadow: none !important;
        }
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .notepad-card {
            background: var(--bg-panel);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .notepad-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent), #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .toolbar-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }
        button, select {
            background: var(--toolbar-bg);
            border: 1px solid var(--border);
            padding: 0.4rem 0.9rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-main);
            transition: 0.1s;
            display: inline-flex;
            gap: 0.4rem;
            align-items: center;
            font-family: inherit;
        }
        button:hover {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .editor-wrapper {
            padding: 1rem 1.5rem 1.5rem;
        }
        #quillEditor {
            min-height: 450px;
        }
        .ql-container {
            font-size: 0.95rem;
        }
        .status-bar {
            padding: 0.6rem 1.5rem;
            font-size: 0.75rem;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        @media (max-width: 700px) {
            .notepad-header { flex-direction: column; align-items: stretch; }
            body { padding: 0.5rem; }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="notepad-card">
        <div class="notepad-header">
            <h1><i class="fas fa-pen-fancy"></i> Kuripedu · குறிப்பேடு</h1>
            <div class="toolbar-group">
                <button id="deepWorkBtn"><i class="fas fa-brain"></i> Deep Work</button>
                <button id="themeToggleBtn"><i class="fas fa-palette"></i> Theme</button>
                <select id="fontSelect">
                    <option value="0.9rem">Font: Small</option>
                    <option value="1rem" selected>Font: Normal</option>
                    <option value="1.2rem">Font: Large</option>
                    <option value="1.4rem">Font: X-Large</option>
                </select>
                <select id="lineHeightSelect">
                    <option value="1.4">Line H: 1.4</option>
                    <option value="1.6" selected>Line H: 1.6</option>
                    <option value="1.8">Line H: 1.8</option>
                    <option value="2.0">Line H: 2.0</option>
                </select>
                <button id="exportBtn"><i class="fas fa-download"></i> Export</button>
            </div>
        </div>
        <div class="editor-wrapper">
            <div id="quillEditor"></div>
        </div>
        <div class="status-bar">
            <span><i class="fas fa-save"></i> Auto-saved</span>
            <span><i class="fas fa-chart-line"></i> Words: <span id="wordCount">0</span> | Characters: <span id="charCount">0</span></span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- 1. Initialize Quill (simple, reliable) ----------
        const quill = new Quill('#quillEditor', {
            theme: 'snow',
            placeholder: 'Start writing... Your notes are automatically saved.',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    ['link', 'clean']
                ]
            }
        });

        // ---------- 2. Helper: update word/character count ----------
        function updateStats() {
            const text = quill.getText();
            const chars = text.length;
            const words = text.trim().split(/\s+/).filter(w => w.length).length;
            document.getElementById('wordCount').innerText = words;
            document.getElementById('charCount').innerText = chars;
        }

        // ---------- 3. Auto-save to localStorage ----------
        const STORAGE_KEY = 'kuripedu_notepad_data';
        function saveToLocal() {
            const content = quill.root.innerHTML;
            localStorage.setItem(STORAGE_KEY, content);
            updateStats();
            // Visual feedback on save status
            const statusSpan = document.querySelector('.status-bar span:first-child');
            if (statusSpan) {
                const originalHtml = statusSpan.innerHTML;
                statusSpan.innerHTML = '<i class="fas fa-check"></i> Saved!';
                setTimeout(() => {
                    if (statusSpan) statusSpan.innerHTML = originalHtml;
                }, 1200);
            }
        }
        function loadFromLocal() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved && saved !== '<p><br></p>') {
                quill.root.innerHTML = saved;
            } else {
                quill.setText('✨ Welcome to Kuripedu ✨\n\n• Write anything – notes, lists, ideas.\n• Click "Deep Work" for fullscreen focus (hides all UI).\n• Change theme, font size, and line height.\n• Export your note as HTML.\n• Everything auto-saves in your browser.\n\nHappy writing!');
            }
            updateStats();
        }
        quill.on('text-change', () => {
            saveToLocal();
        });

        // ---------- 4. Theme Toggle (light / dark / sepia) ----------
        let themeIndex = 0;
        const themes = ['light', 'dark', 'sepia'];
        const savedTheme = localStorage.getItem('kuripedu_theme');
        if (savedTheme === 'dark') { document.body.classList.add('dark'); themeIndex = 1; }
        if (savedTheme === 'sepia') { document.body.classList.add('sepia'); themeIndex = 2; }
        document.getElementById('themeToggleBtn').addEventListener('click', () => {
            themeIndex = (themeIndex + 1) % 3;
            document.body.classList.remove('dark', 'sepia');
            if (themes[themeIndex] === 'dark') document.body.classList.add('dark');
            if (themes[themeIndex] === 'sepia') document.body.classList.add('sepia');
            localStorage.setItem('kuripedu_theme', themes[themeIndex]);
        });

        // ---------- 5. Font size & Line height controls (apply to editor) ----------
        const fontSelect = document.getElementById('fontSelect');
        const lineSelect = document.getElementById('lineHeightSelect');
        function applyEditorStyle() {
            const editorContent = document.querySelector('.ql-editor');
            if (editorContent) {
                editorContent.style.fontSize = fontSelect.value;
                editorContent.style.lineHeight = lineSelect.value;
            }
        }
        fontSelect.addEventListener('change', applyEditorStyle);
        lineSelect.addEventListener('change', applyEditorStyle);
        // initial style after DOM ready
        setTimeout(applyEditorStyle, 100);

        // ---------- 6. Export as HTML file ----------
        document.getElementById('exportBtn').addEventListener('click', () => {
            const content = quill.root.innerHTML;
            const fullHtml = `<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Kuripedu_Export</title>
    <style>
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; padding: 2rem; max-width: 900px; margin: 0 auto; line-height: 1.6; }
        h1 { color: #3b82f6; }
        .ql-editor { font-size: 1rem; }
    </style>
</head>
<body>
<h1>📝 Kuripedu Export</h1>
${content}
</body>
</html>`;
            const blob = new Blob([fullHtml], { type: 'text/html' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `kuripedu_${Date.now()}.html`;
            link.click();
            URL.revokeObjectURL(link.href);
        });

        // ---------- 7. Deep Work Mode (fullscreen + hide UI) ----------
        const deepBtn = document.getElementById('deepWorkBtn');
        let isDeep = false;
        function toggleDeepWork() {
            if (!isDeep) {
                // Enter deep work mode
                document.body.classList.add('deep-work');
                const elem = document.documentElement;
                if (elem.requestFullscreen) {
                    elem.requestFullscreen().catch(err => console.warn('Fullscreen error:', err));
                }
                deepBtn.innerHTML = '<i class="fas fa-undo-alt"></i> Exit Deep Work';
                isDeep = true;
            } else {
                // Exit deep work mode
                document.body.classList.remove('deep-work');
                if (document.exitFullscreen) {
                    document.exitFullscreen().catch(err => console.warn('Exit fullscreen error:', err));
                }
                deepBtn.innerHTML = '<i class="fas fa-brain"></i> Deep Work';
                isDeep = false;
            }
        }
        deepBtn.addEventListener('click', toggleDeepWork);
        // Listen for fullscreen change (if user presses ESC)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && isDeep) {
                document.body.classList.remove('deep-work');
                deepBtn.innerHTML = '<i class="fas fa-brain"></i> Deep Work';
                isDeep = false;
            }
        });

        // ---------- 8. Load saved data on start ----------
        loadFromLocal();

        // Optional periodic backup (every 30 seconds)
        setInterval(saveToLocal, 30000);
    })();
</script>
</body>
</html>
